<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Código QR | {{ maquina.id_activo }}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
            font-family:'Segoe UI',sans-serif;
        }

        .card-qr{

            max-width:700px;
            margin:50px auto;
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,.12);

        }

        .header{

            background:#198754;
            color:white;
            padding:30px;
            text-align:center;

        }

        .header h2{

            font-weight:700;
            margin-bottom:5px;

        }

        .header p{

            margin:0;
            opacity:.9;

        }

        .qr-box{

            padding:40px;
            text-align:center;

        }

        .qr-box img{

            width:280px;
            border:10px solid #fff;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);

        }

        .info{

            margin-top:30px;
            font-size:18px;

        }

        .badge{

            font-size:15px;
            padding:10px 18px;

        }

        .botones{

            margin-top:35px;

        }

    </style>

</head>

<body>

<div class="container">

    <div class="card card-qr">

        <div class="header">

            <h2>

                <i class="bi bi-qr-code"></i>

                Código QR del Activo

            </h2>

            <p>Vital Health</p>

        </div>

        <div class="qr-box">

    <h3 class="text-success fw-bold">

        {{ maquina.id_activo }}

    </h3>

    <h5 class="text-muted mb-4">

        {{ maquina.descripcion }}

    </h5>

    <img
        src="data:image/png;base64,{{ qr }}"
        class="img-fluid rounded shadow p-3 bg-white"
        style="max-width:300px;">


            <div class="info">

                <p>

                    <strong>Marca:</strong>

                    {{ maquina.marca or "Sin registrar" }}

                </p>

                <p>

                    <strong>Modelo:</strong>

                    {{ maquina.modelo or "Sin registrar" }}

                </p>

                <p>

                    <strong>Serie:</strong>

                    {{ maquina.numero_serie or "Sin registrar" }}

                </p>

                <span class="badge bg-success">

                    ACTIVO

                </span>

            </div>

            <div class="botones">

                <button
                        onclick="window.print()"
                        class="btn btn-primary rounded-pill px-4">

                    <i class="bi bi-printer"></i>

                    Imprimir

                </button>

                <a href="{{ url_for('expediente_maquinaria',
                                    id_activo=maquina.id_activo) }}"
                   class="btn btn-secondary rounded-pill px-4">

                    <i class="bi bi-arrow-left"></i>

                    Regresar

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
