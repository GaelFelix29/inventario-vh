{% extends "base.html" %}

{% block titulo %}
Nuevo Usuario
{% endblock %}

{% block contenido %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="card-header bg-success text-white">

                <h3 class="mb-0">

                    <i class="bi bi-person-plus-fill"></i>

                    Nuevo Usuario

                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Nombre completo

                        </label>

                        <input
                            type="text"
                            name="nombre"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Usuario

                        </label>

                        <input
                            type="text"
                            name="usuario"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Correo

                        </label>

                        <input
                            type="email"
                            name="correo"
                            class="form-control"
                            required>

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="mb-3">

                                <label class="form-label">

                                    Contraseña

                                </label>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    required>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="mb-3">

                                <label class="form-label">

                                    Confirmar contraseña

                                </label>

                                <input
                                    type="password"
                                    name="confirmar"
                                    class="form-control"
                                    required>

                            </div>

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Rol

                        </label>

                        <select
                            name="rol"
                            class="form-select">
                            <option value="Administrador">Administrador</option>
                            <option value="Mantenimiento">Mantenimiento</option>
                            <option value="Visualizador">Visualizador</option>

                        </select>

                    </div>

                    <div class="d-flex justify-content-between">

                        <a
                            href="/usuarios"
                            class="btn btn-secondary">

                            <i class="bi bi-arrow-left"></i>

                            Regresar

                        </a>

                        <button
                            class="btn btn-success">

                            <i class="bi bi-check-circle"></i>

                            Guardar Usuario

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
